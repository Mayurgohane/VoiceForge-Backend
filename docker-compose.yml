services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://voiceforge:voiceforge@postgres:5432/voiceforge
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      STT_PROVIDER: mock
      TTS_PROVIDER: mock
      LLM_PROVIDER: mock
      API_KEY: dev-local-key-change-me
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voiceforge
      POSTGRES_USER: voiceforge
      POSTGRES_PASSWORD: voiceforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceforge -d voiceforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
